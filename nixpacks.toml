# Nixpacks config for Railway: Bun install, build server bundle, run compiled output.
# "..." merges with Nixpacks' auto-detected Bun setup (see Nixpacks configuring builds).
# Set MongoDB connection via service variables; PORT is provided by Railway.

[phases.install]
cmds = ["...", "bun install --frozen-lockfile"]

[phases.build]
cmds = ["...", "bun run build:server"]

[start]
cmd = "bun run start"
